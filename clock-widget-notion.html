<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=900, initial-scale=1.0">
  <title>Clock Widget Notion Embed</title>
  <style>
    :root {
      --frame-width: 900px;
      --frame-height: 540px;
      --stage-padding: 18px;
      --widget-width: 338px;
      --widget-height: 188px;
      --radius: 34px;
      --bg-top: #1a2433;
      --bg-bottom: #0b111a;
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-main: #f7fbff;
      --text-soft: rgba(247, 251, 255, 0.68);
      --accent: #80c7ff;
      --accent-soft: rgba(128, 199, 255, 0.18);
      --shadow: 0 24px 60px rgba(4, 8, 18, 0.45);
      --font-stack: "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: var(--frame-width);
      height: var(--frame-height);
      margin: 0;
      overflow: hidden;
      background: #171717;
      font-family: var(--font-stack);
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      padding: var(--stage-padding);
      background: #171717;
    }

    .widget-shell {
      position: absolute;
      top: var(--stage-padding);
      left: var(--stage-padding);
      width: var(--widget-width);
      height: var(--widget-height);
    }

    .clock-widget {
      position: relative;
      width: 100%;
      min-height: var(--widget-height);
      padding: 22px 24px;
      border-radius: var(--radius);
      color: var(--text-main);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
      overflow: hidden;
      isolation: isolate;
    }

    .clock-widget::before,
    .clock-widget::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      z-index: -1;
      filter: blur(8px);
    }

    .clock-widget::before {
      top: -34px;
      right: -30px;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(128, 199, 255, 0.22), transparent 68%);
    }

    .clock-widget::after {
      bottom: -52px;
      left: -42px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.08), transparent 66%);
    }

    .clock-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .clock-label {
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .clock-zone {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .clock-zone-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px rgba(128, 199, 255, 0.85);
    }

    .clock-time {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      margin-top: 10px;
      line-height: 0.9;
    }

    .clock-hours {
      font-size: 5.35rem;
      font-weight: 700;
      letter-spacing: -0.06em;
      text-shadow: 0 8px 30px rgba(0, 0, 0, 0.24);
      font-variant-numeric: tabular-nums;
    }

    .clock-meridiem {
      padding-bottom: 10px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .clock-meta {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-top: 16px;
    }

    .clock-date {
      font-size: 1rem;
      font-weight: 500;
      color: rgba(247, 251, 255, 0.9);
    }

    .theme-menu {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 3;
    }

    .theme-trigger {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-main);
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: transform 160ms ease, background 160ms ease;
    }

    .theme-trigger:hover,
    .theme-trigger[aria-expanded="true"] {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.1);
    }

    .theme-trigger svg {
      width: 16px;
      height: 16px;
    }

    .theme-picker {
      position: absolute;
      right: 0;
      bottom: 46px;
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      white-space: nowrap;
    }

    .theme-picker[data-open="true"] {
      display: flex;
    }

    .theme-label {
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .theme-options {
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }

    .theme-swatch {
      width: 18px;
      height: 18px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      background: var(--swatch);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.12),
        inset 0 1px 2px rgba(255, 255, 255, 0.22);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .theme-swatch:hover {
      transform: scale(1.08);
    }

    .theme-swatch[aria-pressed="true"] {
      box-shadow:
        0 0 0 2px rgba(255, 255, 255, 0.95),
        0 0 0 6px rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Clock widget embed stage">
    <div class="widget-shell">
      <section class="clock-widget" aria-label="Current time widget">
        <div class="clock-top">
          <div class="clock-label">Local Time</div>
          <div class="clock-zone" aria-label="Timezone">
            <span class="clock-zone-dot" aria-hidden="true"></span>
            <span id="timezone">Loading...</span>
          </div>
        </div>

        <div class="clock-time" aria-live="polite">
          <div class="clock-hours" id="time">00:00</div>
          <div class="clock-meridiem" id="meridiem">AM</div>
        </div>

        <div class="clock-meta">
          <div class="clock-date" id="date">Monday, January 1</div>
        </div>
      </section>

      <div class="theme-menu">
        <button class="theme-trigger" id="theme-trigger" type="button" aria-label="Open color options" aria-expanded="false" aria-controls="theme-picker">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 3.75A8.25 8.25 0 1 0 12 20.25h.46a2.54 2.54 0 0 0 2.54-2.54 2.54 2.54 0 0 1 2.54-2.54h.71A3.75 3.75 0 0 0 22 11.42C21.7 7.16 17.53 3.75 12 3.75Z" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="7.8" cy="11.1" r="1.1" fill="currentColor"/>
            <circle cx="10.9" cy="7.8" r="1.1" fill="currentColor"/>
            <circle cx="15.1" cy="8.5" r="1.1" fill="currentColor"/>
          </svg>
        </button>

        <div class="theme-picker" id="theme-picker" data-open="false" aria-label="Color theme chooser">
          <div class="theme-label">Colors</div>
          <div class="theme-options" id="theme-options">
            <button class="theme-swatch" type="button" data-theme="midnight" aria-label="Midnight blue theme" aria-pressed="true" style="--swatch: linear-gradient(135deg, #314d73, #0b111a);"></button>
            <button class="theme-swatch" type="button" data-theme="sunset" aria-label="Sunset theme" aria-pressed="false" style="--swatch: linear-gradient(135deg, #88546c, #291722);"></button>
            <button class="theme-swatch" type="button" data-theme="forest" aria-label="Forest theme" aria-pressed="false" style="--swatch: linear-gradient(135deg, #30564f, #0f1918);"></button>
            <button class="theme-swatch" type="button" data-theme="slate" aria-label="Slate theme" aria-pressed="false" style="--swatch: linear-gradient(135deg, #515868, #161a23);"></button>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script>
    const timeEl = document.getElementById("time");
    const meridiemEl = document.getElementById("meridiem");
    const dateEl = document.getElementById("date");
    const timezoneEl = document.getElementById("timezone");
    const themeTriggerEl = document.getElementById("theme-trigger");
    const themePickerEl = document.getElementById("theme-picker");
    const themeOptionsEl = document.getElementById("theme-options");

    const themes = {
      midnight: { bgTop: "#1a2433", bgBottom: "#0b111a", accent: "#80c7ff", accentSoft: "rgba(128, 199, 255, 0.18)" },
      sunset: { bgTop: "#5d3146", bgBottom: "#1a0d14", accent: "#ffb37c", accentSoft: "rgba(255, 179, 124, 0.18)" },
      forest: { bgTop: "#1e3c39", bgBottom: "#091110", accent: "#8ce2c7", accentSoft: "rgba(140, 226, 199, 0.16)" },
      slate: { bgTop: "#394153", bgBottom: "#0f131b", accent: "#b6c7ff", accentSoft: "rgba(182, 199, 255, 0.16)" }
    };

    function getTimezoneLabel() {
      const zone = Intl.DateTimeFormat().resolvedOptions().timeZone || "Local";
      const parts = zone.split("/");
      return parts[parts.length - 1].replace(/_/g, " ");
    }

    function updateClock() {
      const now = new Date();
      const timeParts = new Intl.DateTimeFormat([], {
        hour: "numeric",
        minute: "2-digit",
        hour12: true
      }).formatToParts(now);

      const hourMinute = timeParts
        .filter((part) => part.type === "hour" || part.type === "minute" || part.type === "literal")
        .map((part) => part.value)
        .join("");

      const meridiem = timeParts.find((part) => part.type === "dayPeriod")?.value ?? "";
      timeEl.textContent = hourMinute;
      meridiemEl.textContent = meridiem;
      dateEl.textContent = new Intl.DateTimeFormat([], {
        weekday: "long",
        month: "long",
        day: "numeric"
      }).format(now);
    }

    function setTheme(themeName) {
      const theme = themes[themeName];
      if (!theme) return;

      document.documentElement.style.setProperty("--bg-top", theme.bgTop);
      document.documentElement.style.setProperty("--bg-bottom", theme.bgBottom);
      document.documentElement.style.setProperty("--accent", theme.accent);
      document.documentElement.style.setProperty("--accent-soft", theme.accentSoft);

      themeOptionsEl.querySelectorAll(".theme-swatch").forEach((swatch) => {
        swatch.setAttribute("aria-pressed", String(swatch.dataset.theme === themeName));
      });
    }

    function setThemeMenu(open) {
      themePickerEl.dataset.open = String(open);
      themeTriggerEl.setAttribute("aria-expanded", String(open));
    }

    timezoneEl.textContent = getTimezoneLabel();
    themeTriggerEl.addEventListener("click", () => {
      setThemeMenu(themePickerEl.dataset.open !== "true");
    });

    themeOptionsEl.addEventListener("click", (event) => {
      const swatch = event.target.closest(".theme-swatch");
      if (!swatch) return;
      setTheme(swatch.dataset.theme);
      setThemeMenu(false);
    });

    document.addEventListener("click", (event) => {
      if (event.target.closest(".theme-menu")) return;
      setThemeMenu(false);
    });

    setTheme("midnight");
    setThemeMenu(false);
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
